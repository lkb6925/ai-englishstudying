<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow Reader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: 'Pretendard Variable', 'Pretendard', system-ui, sans-serif;
      background: #0a0a0f;
      color: #f4f4f5;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 16px;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.1));
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px; height: 32px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }

    .logo-text { font-weight: 900; font-size: 15px; }
    .logo-sub { font-size: 11px; color: #71717a; margin-top: 1px; }

    .body { padding: 16px; }

    .status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 10px; margin-bottom: 12px;
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25);
      font-size: 13px; font-weight: 600; color: #6ee7b7;
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #10b981;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .key-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 700;
      background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.3);
      color: #818cf8; width: 100%; margin-bottom: 12px;
    }

    .key-icon {
      font-size: 16px; width: 28px; height: 28px; border-radius: 6px;
      background: rgba(99,102,241,0.2); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 10px 14px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none;
      transition: all 0.15s ease; margin-bottom: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      color: #a1a1aa;
    }

    .btn:hover { transform: scale(1.02); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">📖</div>
    <div>
      <div class="logo-text">Flow Reader</div>
      <div class="logo-sub">AI 영어 단어 조회</div>
    </div>
  </div>

  <div class="body">
    <div class="status">
      <span class="dot"></span>
      확장앱 활성화됨
    </div>

    <div class="key-badge" id="modifier-display">
      <span class="key-icon">⌥</span>
      <span id="modifier-text">Alt / Option + 마우스 올리기</span>
    </div>

    <a href="http://localhost:3000/wordbook" target="_blank" class="btn btn-primary">
      📚 내 단어장 열기
    </a>

    <button class="btn btn-secondary" id="options-btn">
      ⚙️ 설정 (단축키 변경)
    </button>
  </div>

  <script>
    // Load current modifier setting
    chrome.storage.sync.get(['flow_reader_modifier']).then((values) => {
      const modifier = values.flow_reader_modifier || 'alt_option';
      const text = document.getElementById('modifier-text');
      const icon = document.querySelector('.key-icon');
      if (modifier === 'cmd_ctrl') {
        text.textContent = 'Cmd / Ctrl + 마우스 올리기';
        icon.textContent = '⌘';
      } else {
        text.textContent = 'Alt / Option + 마우스 올리기';
        icon.textContent = '⌥';
      }
    });

    document.getElementById('options-btn').addEventListener('click', () => {
      chrome.runtime.openOptionsPage();
    });
  </script>
</body>
</html>
